{% extends "partials/transactional/layout.html" %}
{% block content %}
<h1 style="margin:0 0 12px;color:#3E1964;font-size:22px;line-height:1.3;">{{ headline }}</h1>
{% if subtitle %}
<p style="margin:0 0 20px;color:#4a4458;font-size:16px;line-height:1.6;">{{ subtitle }}</p>
{% endif %}
{% if body %}
<div style="margin:0 0 24px;color:#2d2938;font-size:15px;line-height:1.65;white-space:pre-wrap;">{{ body }}</div>
{% endif %}
{% if action_url and action_label %}
<p style="margin:0 0 8px;">
  <a href="{{ action_url }}" style="display:inline-block;background:#3E1964;color:#ffffff;text-decoration:none;padding:14px 28px;border-radius:980px;font-size:15px;font-weight:600;">{{ action_label }}</a>
</p>
{% endif %}
{% endblock %}
