<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ subject }}</title>
</head>
<body style="margin:0;padding:0;background:#f7f8fc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#2d2938;-webkit-font-smoothing:antialiased;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f7f8fc;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid rgba(62,25,100,0.14);box-shadow:0 8px 32px rgba(62,25,100,0.08);">
          <tr>
            <td style="background:#3E1964;padding:20px 28px;text-align:center;">
              <p style="margin:0;color:#ffffff;font-size:22px;font-weight:700;letter-spacing:0.02em;">Eventtz</p>
            </td>
          </tr>
          <tr>
            <td style="padding:32px 28px 24px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:0 28px 28px;border-top:1px solid rgba(62,25,100,0.08);">
              <p style="margin:16px 0 0;color:#8a8199;font-size:12px;line-height:1.5;text-align:center;">
                You're receiving this because you have an Eventtz account.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
